{% extends "base.html" %}

{% block title %}Add Service{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    <h3 class="text-center">
                        Add New Service
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Service Name
                            </label>

                            <input
                                type="text"
                                name="service_name"
                                class="form-control"
                                placeholder="Enter service name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Price (₹)
                            </label>

                            <input
                                type="number"
                                name="price"
                                class="form-control"
                                placeholder="Enter price"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Duration (Minutes)
                            </label>

                            <input
                                type="number"
                                name="duration"
                                class="form-control"
                                placeholder="Example: 30"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            Add Service

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
