{% extends "base.html" %}

{% block title %}Book Appointment{% endblock %}

{% block content %}

<h2>Book Appointment</h2>

<h4>{{ service.service_name }}</h4>

<p>Price : ₹{{ service.price }}</p>

<form method="POST">

<div class="mb-3">

<label>Date</label>

<input
type="date"
name="booking_date"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Time</label>

<input
type="time"
name="booking_time"
class="form-control"
required>

</div>

<button class="btn btn-primary">

Confirm Booking

</button>

</form>

{% endblock %}
