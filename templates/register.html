{% extends "base.html" %}

{% block title %}

Register

{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<h2 class="text-center mb-4">

Create Account

</h2>

<form method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="full_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Role</label>

<select
name="role"
class="form-select">

<option value="customer">

Customer

</option>

<option value="owner">

Salon Owner

</option>

</select>

</div>

<button class="btn btn-primary w-100">

Register

</button>

</form>

<p class="text-center mt-3">

Already have an account?

<a href="{{ url_for('auth.login') }}">

Login

</a>

</p>

</div>

</div>

{% endblock %}
