{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Add Service</h2>

<h4>{{ salon.salon_name }}</h4>

<form method="POST">

<div class="mb-3">
<label>Service Name</label>
<input type="text"
name="service_name"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Price</label>
<input type="number"
name="price"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Duration (Minutes)</label>
<input type="number"
name="duration"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea
name="description"
class="form-control">
</textarea>
</div>

<button class="btn btn-success">
Add Service
</button>

</form>

</div>

{% endblock %}
