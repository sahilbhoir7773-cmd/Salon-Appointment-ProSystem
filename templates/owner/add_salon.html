{% extends "base.html" %}

{% block title %}Add Salon{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Add Salon</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Salon Name</label>
            <input
                type="text"
                name="salon_name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input
                type="text"
                name="address"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>City</label>
            <input
                type="text"
                name="city"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input
                type="text"
                name="phone"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Opening Time</label>
            <input
                type="time"
                name="opening_time"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Closing Time</label>
            <input
                type="time"
                name="closing_time"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea
                name="description"
                class="form-control"
                rows="4"></textarea>
        </div>

        <button class="btn btn-success">
            Save Salon
        </button>

    </form>

</div>

{% endblock %}
