{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                placeholder="Enter Full Name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                                type="tel"
                                name="phone"
                                class="form-control"
                                placeholder="Enter Phone Number"
                                maxlength="10"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input
                                type="password"
                                name="confirm_password"
                                class="form-control"
                                placeholder="Confirm Password"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Register As
                            </label>

                            <select
                                name="role"
                                class="form-select">

                                <option value="customer">
                                    Customer
                                </option>

                                <option value="owner">
                                    Salon Owner
                                </option>

                            </select>

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-warning">

                                Register

                            </button>

                        </div>

                    </form>

                    <hr>

                    <p class="text-center">

                        Already have an account?

                        <a href="{{ url_for('auth.login') }}">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
